<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-TICKET TARGET | Cybersecurity Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    
    <script src="/sdk/z-kinetic.js"></script>

    <style>
        :root {
            --neon-blue: #00d4ff;
            --bg-dark: #020c1b;
            --glass: rgba(0, 212, 255, 0.05);
        }
        body {
            background-color: var(--bg-dark);
            color: #e2e8f0;
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
        }
        .cyber-grid {
            position: fixed; inset: 0;
            background-image: linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: 0;
        }
        .main-container { position: relative; z-index: 1; }
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 212, 255, 0.1);
            border-radius: 16px;
        }
        .neon-glow {
            text-shadow: 0 0 15px rgba(0, 212, 255, 0.6);
            color: var(--neon-blue);
        }
        .btn-action {
            background: linear-gradient(135deg, #00d4ff, #00ffea);
            color: #020c1b;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }
        .btn-action:active { transform: translateY(0); }
    </style>
</head>
<body class="p-6">
    <div class="cyber-grid"></div>

    <div class="main-container max-w-xl mx-auto">
        <div class="text-center mb-10">
            <div class="inline-block px-4 py-1 mb-4 rounded-full border border-cyan-500/30 bg-cyan-500/10">
                <span class="text-[10px] font-mono tracking-[0.3em] text-cyan-400">ENCRYPTED CONNECTION</span>
            </div>
            <h1 class="font-orbitron text-4xl font-black neon-glow mb-2">Z-TICKET TARGET</h1>
            <p class="font-mono text-[10px] text-slate-500 tracking-widest uppercase">Automated Defense Simulator // WAF V9.0</p>
        </div>

        <div class="glass-card p-6 mb-6">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-2 h-2 rounded-full bg-cyan-400 animate-pulse"></div>
                <h2 class="font-orbitron text-xs font-bold tracking-wider text-slate-300">KONFIGURASI PERISAI</h2>
            </div>
            <select id="modPerisai" class="w-full p-4 bg-slate-950/80 border border-cyan-500/20 rounded-xl text-cyan-400 font-bold outline-none focus:border-cyan-400/50 transition-colors">
                <option value="clean">MODE CLEAN (BYPASS)</option>
                <option value="integrated">MODE INTEGRATED (Z-KINETIC ACTIVE)</option>
            </select>
        </div>

        <div class="glass-card p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-orbitron text-xs font-bold tracking-wider text-slate-300">TIKET TERSEDIA</h2>
                <button onclick="muatData()" class="text-[10px] font-mono text-cyan-600 hover:text-cyan-400 transition-colors">REFRESH_DATABASE</button>
            </div>
            
            <div id="senaraiTiket" class="space-y-4">
                <div class="text-center py-10">
                    <div class="inline-block w-6 h-6 border-2 border-cyan-500/30 border-t-cyan-500 rounded-full animate-spin"></div>
                </div>
            </div>
        </div>

        <p class="text-center font-mono text-[10px] text-slate-700 mt-10">
            SECURED BY Z-KINETIC BIOMETRIC PROTOCOL © 2026
        </p>
    </div>

    <script>
        const API_URL = "https://zticketapp-dxtcyy6wma-as.a.run.app/api/demo";

        async function muatData() {
            try {
                const res = await fetch(`${API_URL}/stats`);
                const data = await res.json();
                let html = "";
                
                for (let id in data.tickets) {
                    const t = data.tickets[id];
                    const isSoldOut = t.available <= 0;
                    
                    html += `
                    <div class="bg-slate-950/40 p-5 rounded-xl border border-slate-800 flex justify-between items-center group hover:border-cyan-500/30 transition-all">
                        <div>
                            <p class="font-bold text-white tracking-wide mb-1">${t.name}</p>
                            <div class="flex items-center gap-3 text-[10px] font-mono">
                                <span class="${isSoldOut ? 'text-red-500' : 'text-cyan-500'}">${isSoldOut ? 'SOLD_OUT' : 'TERSEDIA: ' + t.available}</span>
                                <span class="text-slate-600">ID: ${id.toUpperCase()}</span>
                            </div>
                        </div>
                        <button 
                            onclick="tekanBeli('${id}')" 
                            ${isSoldOut ? 'disabled' : ''} 
                            class="btn-action px-6 py-2 rounded-lg text-[10px] ${isSoldOut ? 'opacity-20 grayscale cursor-not-allowed' : ''}">
                            ${isSoldOut ? 'HABIS' : 'TEMPAH'}
                        </button>
                    </div>`;
                }
                document.getElementById("senaraiTiket").innerHTML = html;
            } catch (e) {
                document.getElementById("senaraiTiket").innerHTML = `
                    <div class="text-center p-6 border border-red-500/20 rounded-xl bg-red-500/5">
                        <p class="text-red-400 font-mono text-xs text-center uppercase">Ralat sambungan ke pelayan pusat.</p>
                    </div>`;
            }
        }

        function tekanBeli(id) {
            const mod = document.getElementById("modPerisai").value;

            if (mod === "clean") {
                hantarPembelian(id, true);
            } else {
                // INTEGRASI SDK WEB Z-KINETIC ULTIMATE
                ZKinetic.show({
                    appId: 'zk_live_demo_01',
                    serverUrl: 'https://zticketapp-dxtcyy6wma-as.a.run.app',
                    imageUrl: '/sdk/z_wheel3.png',
                    onSuccess: (result) => {
                        console.log('Human verified via SDK:', result);
                        hantarPembelian(id, true);
                    },
                    onCancel: () => {
                        console.log('User cancelled the biometric challenge');
                    }
                });
            }
        }

        async function hantarPembelian(id, isHuman) {
            try {
                const res = await fetch(`${API_URL}/purchase`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ eventId: id, isVerifiedHuman: isHuman })
                });
                const data = await res.json();
                
                if (data.success) {
                    alert("PENGESAHAN BERJAYA: Tiket telah berjaya diproses.");
                } else {
                    alert("AKSES DISEKAT: " + data.error);
                }
                muatData();
            } catch (e) {
                alert("Ralat sistem semasa memproses transaksi.");
            }
        }
        muatData();
    </script>
</body>
</html>
